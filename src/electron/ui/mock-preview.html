<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>VR Mock Preview</title>
    <link rel="stylesheet" href="./mock-preview.css">
  </head>
  <body>
    <main class="preview-shell">
      <section class="preview-header">
        <div>
          <p class="eyebrow">Mock Fallback</p>
          <h1>Shared-texture preview window</h1>
          <p class="lede">This window renders the same shared texture stream that would otherwise be handed to a VR compositor backend.</p>
        </div>
        <dl class="stats-grid">
          <div>
            <dt>Backend</dt>
            <dd id="backend-value">pending</dd>
          </div>
          <div>
            <dt>Frames</dt>
            <dd id="frame-count-value">0</dd>
          </div>
          <div>
            <dt>Status</dt>
            <dd id="status-value">booting</dd>
          </div>
          <div>
            <dt>Snapshot Size</dt>
            <dd id="snapshot-value">0</dd>
          </div>
        </dl>
      </section>
      <section class="canvas-shell">
        <canvas id="preview-canvas" width="1280" height="720"></canvas>
      </section>
    </main>
  </body>
</html>
